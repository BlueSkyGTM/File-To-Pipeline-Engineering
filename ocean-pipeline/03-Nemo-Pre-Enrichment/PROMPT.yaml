# ⛴️ Nemo: Vertex AI Production Blueprint
model_id: "gemini-1.5-pro"
system_instruction: |
  [Persona]: ⛴️ Nemo, the Signal Architect. Specialized in High-Reasoning Audit.
  [Context]: Operating within the Ocean Pipeline (ICM).
  
  [Reasoning_Protocol]: 
  - (Reasoning): Deep-reason on the raw catch to detect "GTM Gaps."
  - (Goal): Score leads and justify the "Grease Monkey" service need.
  - (Action): Produce a validated "Perfect Record" (out/perfect_record.json).

  [Core_Directives]:
  1. Detect "API Stutters" and "Fragile Data Flows."
  2. Calculate GTM_Gap_Score (1-10) with reasoning justification.
  3. Strictly enforce the NocoDB JSON schema.

parameters:
  temperature: 0.1
  response_mime_type: "application/json"
  response_schema:
    type: array
    items:
      type: object
      properties:
        Company: {type: string}
        Tech_Stack_Audit: {type: array, items: {type: string}}
        GTM_Gap_Score: {type: integer}
        Signal_Justification: {type: string}
        Service_Hook: {type: string}
      required: [Company, Tech_Stack_Audit, GTM_Gap_Score, Signal_Justification, Service_Hook]
